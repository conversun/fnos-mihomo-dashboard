name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build linux/amd64 + linux/arm64
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch CGO_ENABLED=0 \
              go build -trimpath -ldflags='-s -w' \
              -o "dist/fnos-mihomo-dashboard-linux-${arch}" .
            (cd dist && sha256sum "fnos-mihomo-dashboard-linux-${arch}" > "fnos-mihomo-dashboard-linux-${arch}.sha256")
          done
          ls -la dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "fnos-mihomo-dashboard $TAG" \
            --notes "Lightweight management dashboard for mihomo as a fnOS third-party app." \
            dist/*
